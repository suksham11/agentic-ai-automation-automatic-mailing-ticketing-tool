services:
  - type: web
    name: agentic-ai-support-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: EMAIL_DELIVERY_MODE
        value: safe
      - key: API_AUTH_ENABLED
        value: true
      - key: API_KEY
        sync: false
      - key: API_KEY_HEADER
        value: X-API-Key
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_REQUESTS
        value: 60
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: CORS_ORIGINS
        sync: false
      - key: POSTGRES_DSN
        fromDatabase:
          name: agentic-ai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agentic-ai-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ZENDESK_BASE_URL
        sync: false
      - key: ZENDESK_EMAIL
        sync: false
      - key: ZENDESK_API_TOKEN
        sync: false
      - key: GMAIL_SENDER_EMAIL
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false

  - type: redis
    name: agentic-ai-redis
    plan: free
    ipAllowList: []

databases:
  - name: agentic-ai-postgres
    databaseName: support_agent
    user: support_agent
    plan: free
